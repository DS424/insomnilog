name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "insomnilog") | .version')
          echo "Tag version:   $GITHUB_REF_NAME"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$GITHUB_REF_NAME" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

  dry-run:
    needs: [ci, version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run publish
        run: cargo publish --dry-run -p insomnilog

  publish:
    needs: [dry-run]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Publish to crates.io
        run: cargo publish -p insomnilog
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
